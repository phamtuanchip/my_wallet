<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#1976D2"/>

  <!-- Smartphone body -->
  <rect x="176" y="120" width="160" height="272" rx="24" ry="24" fill="#FFFFFF" stroke="#1976D2" stroke-width="4"/>

  <!-- Screen -->
  <rect x="192" y="144" width="128" height="192" rx="8" ry="8" fill="#1976D2"/>

  <!-- NFC antenna waves -->
  <path d="M224 336 Q240 320 256 336 Q272 352 288 336" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M216 344 Q240 312 256 344 Q272 376 296 344" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M208 352 Q240 304 256 352 Q272 400 304 352" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- NFC card symbol on screen -->
  <rect x="216" y="168" width="80" height="48" rx="4" ry="4" fill="#FFFFFF" stroke="#1976D2" stroke-width="2"/>
  <circle cx="236" cy="184" r="3" fill="#1976D2"/>
  <circle cx="256" cy="184" r="3" fill="#1976D2"/>
  <circle cx="276" cy="184" r="3" fill="#1976D2"/>
  <circle cx="236" cy="196" r="3" fill="#1976D2"/>
  <circle cx="276" cy="196" r="3" fill="#1976D2"/>
  <circle cx="236" cy="208" r="3" fill="#1976D2"/>
  <circle cx="256" cy="208" r="3" fill="#1976D2"/>
  <circle cx="276" cy="208" r="3" fill="#1976D2"/>

  <!-- Card chip -->
  <rect x="240" y="176" width="32" height="20" rx="2" ry="2" fill="#FFD700" stroke="#FFA000" stroke-width="1"/>
  <rect x="244" y="180" width="24" height="12" rx="1" ry="1" fill="#000000"/>
  <rect x="246" y="182" width="20" height="8" rx="0.5" ry="0.5" fill="#FFD700"/>

  <!-- NFC logo -->
  <text x="256" y="280" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="16" font-weight="bold">NFC</text>
  <text x="256" y="296" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="12">WALLET</text>
</svg>